name: Crime & Safety Pipeline

# ── Schedule: aligned to NCRB publication cycle ────────────────────
# NCRB publishes "Crime in India" annually, typically Sep-Dec.
# Semi-annual runs catch new NCRB publications and corrections.
# Curated data (NCRB figures, MoRTH road data, BPRD police data)
# lives in pipeline source files and must be updated when new
# annual reports are published.

on:
  schedule:
    # Semi-annual: Jan 15 + Jul 15 — 6 AM UTC (11:30 AM IST)
    - cron: '0 6 15 1 *'    # Jan 15 — post-NCRB publication check
    - cron: '0 6 15 7 *'    # Jul 15 — mid-year corrections
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-process all crime data'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  update-crime-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: |
          cd pipeline
          pip install requests pydantic

      - name: Run Crime & Safety pipeline
        run: |
          cd pipeline
          python src/crime/main.py

      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet public/data/crime/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "India Data Pipeline"
          git config user.email "pipeline@india-data-portal.dev"
          git add public/data/crime/
          git commit -m "data: update Crime & Safety data $(date +%Y-%m-%d)

          Automated pipeline run. Sources: NCRB Crime in India 2022, MoRTH 2022, BPRD 2022, World Bank.
          Triggered by: ${{ github.event_name }}"
          git push

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Crime & Safety pipeline failure: ${new Date().toISOString().slice(0,10)}`,
              body: `The Crime & Safety data pipeline failed.\n\n` +
                    `**Trigger:** ${context.eventName}\n` +
                    `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `The frontend continues serving the last known good data.`,
              labels: ['pipeline', 'automated']
            });
